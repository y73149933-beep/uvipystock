# Alembic configuration for crypto-exchange-sandbox
# The connection URL is overridden at runtime by env.py (read from Settings),
# but a default is provided here for `alembic` CLI usage outside Docker.

[alembic]
script_location = backend/alembic
prepend_sys_path = backend
version_path_separator = os
sqlalchemy.url = postgresql+asyncpg://exchange:exchange@localhost:5432/exchange

[post_write_hooks]
# Auto-format generated migrations with black
hooks = black
black.type = console_scripts
black.entrypoint = black
black.options = -l 100

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
