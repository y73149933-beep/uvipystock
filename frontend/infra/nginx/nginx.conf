# Nginx reverse proxy: routes /api → backend, /ws → backend WS, / → frontend, /admin → admin panel

upstream backend_api {
    server backend:8000;
}

upstream frontend_static {
    server frontend:80;
}

upstream admin_static {
    server admin:80;
}

server {
    listen 80;
    server_name _;

    # ─── Admin panel (must come before /api to catch /admin paths) ──────────
    location /admin {
        proxy_pass http://admin_static;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ─── API + WebSocket → backend ──────────────────────────────────────────
    location /api {
        proxy_pass http://backend_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (for /api/v1/ws/*)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts for long-lived WS connections
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ─── Swagger docs → backend ─────────────────────────────────────────────
    location /docs {
        proxy_pass http://backend_api;
        proxy_set_header Host $host;
    }
    location /openapi.json {
        proxy_pass http://backend_api;
        proxy_set_header Host $host;
    }
    location /redoc {
        proxy_pass http://backend_api;
        proxy_set_header Host $host;
    }

    # ─── Frontend SPA (catch-all) ───────────────────────────────────────────
    location / {
        proxy_pass http://frontend_static;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
